<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyberpunk Spin Wheel</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Orbitron', sans-serif;
    min-height:100vh;
    background:
        radial-gradient(circle at top,#1b2735,#090a0f);
    overflow-x:hidden;
    color:white;
}

/* Background Neon */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:
        linear-gradient(
            45deg,
            #00ffff22,
            #ff00ff22,
            #00ff8822,
            #ff008822
        );
    animation:bgMove 10s linear infinite;
    z-index:-1;
}

@keyframes bgMove{
    0%{
        transform:translate(-25%,-25%) rotate(0deg);
    }
    100%{
        transform:translate(-25%,-25%) rotate(360deg);
    }
}

.container{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    flex-wrap:wrap;
    padding:40px;
}

/* LEFT PANEL */

.panel{
    width:340px;
    padding:25px;
    border-radius:25px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,255,255,0.3);

    backdrop-filter:blur(20px);

    box-shadow:
        0 0 20px #00ffff44,
        inset 0 0 20px #00ffff11;
}

.panel h1{
    font-size:28px;
    margin-bottom:20px;
    color:#00ffff;

    text-shadow:
        0 0 10px #00ffff,
        0 0 20px #00ffff;
}

.panel p{
    margin-bottom:15px;
    opacity:0.8;
    font-size:13px;
    line-height:1.6;
}

textarea{
    width:100%;
    height:260px;

    background:#050816;

    border:1px solid #00ffff66;

    border-radius:18px;

    padding:15px;

    color:#00ffff;

    font-size:16px;

    resize:none;

    outline:none;

    box-shadow:
        inset 0 0 15px #00ffff22;
}

textarea:focus{
    border-color:#ff00ff;
    box-shadow:
        0 0 20px #ff00ff66,
        inset 0 0 15px #ff00ff44;
}

.update-btn{
    margin-top:20px;
    width:100%;
    padding:16px;

    border:none;
    border-radius:16px;

    background:
        linear-gradient(
            45deg,
            #00ffff,
            #ff00ff
        );

    color:white;

    font-size:16px;
    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
        0 0 20px #00ffff88;
}

.update-btn:hover{
    transform:translateY(-3px) scale(1.02);

    box-shadow:
        0 0 30px #ff00ff;
}

/* WHEEL */

.wheel-section{
    text-align:center;
}

.wheel-container{
    position:relative;
    width:550px;
    height:550px;
}

canvas{
    width:100%;
    height:100%;
    border-radius:50%;

    background:#050816;

    box-shadow:
        0 0 20px #00ffff,
        0 0 60px #00ffff55,
        inset 0 0 40px #ffffff22;
}

/* Pointer */

.pointer{
    position:absolute;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;

    border-left:30px solid transparent;
    border-right:30px solid transparent;
    border-top:60px solid #00ffff;

    filter:
        drop-shadow(0 0 15px #00ffff)
        drop-shadow(0 0 30px #00ffff);

    z-index:20;
}

/* SPIN BUTTON */

.spin-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    width:130px;
    height:130px;

    border-radius:50%;

    border:none;

    background:
        radial-gradient(
            circle,
            #ff00ff,
            #6a00ff
        );

    color:white;

    font-size:26px;
    font-weight:900;

    letter-spacing:2px;

    cursor:pointer;

    transition:0.2s;

    z-index:50;

    box-shadow:
        0 0 25px #ff00ff,
        0 0 60px #ff00ff66;
}

.spin-btn:hover{
    transform:translate(-50%,-50%) scale(1.08);
}

.spin-btn:active{
    transform:translate(-50%,-50%) scale(0.96);
}

.result{
    margin-top:35px;

    font-size:32px;
    font-weight:bold;

    color:#00ffff;

    text-shadow:
        0 0 15px #00ffff,
        0 0 30px #00ffff;

    min-height:50px;
}

/* Responsive */

@media(max-width:700px){

    .wheel-container{
        width:350px;
        height:350px;
    }

    .spin-btn{
        width:95px;
        height:95px;
        font-size:18px;
    }

    .result{
        font-size:22px;
    }
}

</style>
</head>
<body>

<div class="container">

    <!-- PANEL -->
    <div class="panel">

        <h1>CYBER SPIN</h1>

        <p>
            1 baris = 1 hadiah / 1 kolom spin
        </p>

        <textarea id="itemsInput">
1000 COIN
JACKPOT
SKIN LEGEND
TRY AGAIN
500 DIAMOND
MYSTERY BOX
BONUS
SUPER WIN
        </textarea>

        <button class="update-btn" id="updateBtn">
            UPDATE WHEEL
        </button>

    </div>

    <!-- WHEEL -->
    <div class="wheel-section">

        <div class="wheel-container">

            <div class="pointer"></div>

            <canvas id="wheel" width="600" height="600"></canvas>

            <button class="spin-btn" id="spinBtn">
                SPIN
            </button>

        </div>

        <div class="result" id="result">
            READY TO SPIN
        </div>

    </div>

</div>

<script>

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const spinBtn = document.getElementById("spinBtn");
const updateBtn = document.getElementById("updateBtn");
const itemsInput = document.getElementById("itemsInput");
const result = document.getElementById("result");

const centerX = canvas.width / 2;
const centerY = canvas.height / 2;
const radius = 270;

let items = [];

let rotation = 0;
let spinning = false;

const colors = [
    "#ff0080",
    "#00e5ff",
    "#7c4dff",
    "#00ff88",
    "#ff9100",
    "#ff1744",
    "#18ffff",
    "#d500f9",
    "#76ff03",
    "#ffd600"
];

function loadItems(){

    items = itemsInput.value
        .split("\n")
        .map(i => i.trim())
        .filter(i => i !== "");

    drawWheel();
}

function drawWheel(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(items.length === 0) return;

    const slice = (Math.PI * 2) / items.length;

    for(let i=0;i<items.length;i++){

        const angle = i * slice + rotation;

        // slice
        ctx.beginPath();

        ctx.moveTo(centerX,centerY);

        ctx.arc(
            centerX,
            centerY,
            radius,
            angle,
            angle + slice
        );

        ctx.closePath();

        ctx.fillStyle = colors[i % colors.length];

        ctx.fill();

        // glow border
        ctx.strokeStyle = "#ffffff";

        ctx.lineWidth = 4;

        ctx.shadowColor = colors[i % colors.length];

        ctx.shadowBlur = 20;

        ctx.stroke();

        ctx.save();

        ctx.translate(centerX,centerY);

        ctx.rotate(angle + slice / 2);

        ctx.fillStyle = "white";

        let fontSize = 24;

        if(items.length > 10) fontSize = 18;
        if(items.length > 15) fontSize = 14;

        ctx.font = `bold ${fontSize}px Orbitron`;

        ctx.textAlign = "right";

        ctx.shadowColor = "#000";

        ctx.shadowBlur = 10;

        ctx.fillText(
            items[i],
            radius - 25,
            10
        );

        ctx.restore();
    }

    // center circle

    ctx.beginPath();

    ctx.arc(centerX,centerY,85,0,Math.PI*2);

    ctx.fillStyle = "#050816";

    ctx.fill();

    ctx.lineWidth = 6;

    ctx.strokeStyle = "#00ffff";

    ctx.shadowColor = "#00ffff";

    ctx.shadowBlur = 20;

    ctx.stroke();
}

updateBtn.addEventListener("click",()=>{

    loadItems();

    result.innerHTML = "WHEEL UPDATED";
});

spinBtn.addEventListener("click",()=>{

    if(spinning || items.length === 0) return;

    spinning = true;

    result.innerHTML = "SPINNING...";

    const extraSpin =
        Math.random() * 360 + 2500;

    const duration = 6000;

    const start = performance.now();

    const startRotation = rotation;

    function animate(now){

        const elapsed = now - start;

        const progress =
            Math.min(elapsed / duration,1);

        const easeOut =
            1 - Math.pow(1 - progress,4);

        rotation =
            startRotation +
            (extraSpin * Math.PI/180) * easeOut;

        drawWheel();

        if(progress < 1){

            requestAnimationFrame(animate);

        }else{

            spinning = false;

            const degrees =
                rotation * 180 / Math.PI;

            const normalized =
                (360 - (degrees % 360) + 90) % 360;

            const index =
                Math.floor(
                    normalized /
                    (360 / items.length)
                );

            result.innerHTML =
                `🎉 ${items[index]}`;
        }
    }

    requestAnimationFrame(animate);

});

loadItems();

</script>

</body>
</html>
